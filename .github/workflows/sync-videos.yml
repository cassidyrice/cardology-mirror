name: Sync Cardology Videos

on:
  schedule:
    - cron: "37 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync videos from YouTube
        env:
          # Optional: add a YOUTUBE_API_KEY repo secret to backfill the full
          # uploads list. Without it, the script uses the public RSS feed
          # (latest ~15 uploads), which is enough to catch new videos.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: bun run sync:videos

      - name: Build site
        run: bun run build

      - name: Commit updated videos
        run: |
          if git diff --quiet -- lib/videos.ts; then
            echo "No new videos."
            exit 0
          fi
          git config user.name "Cardology Pro Video Bot"
          git config user.email "actions@github.com"
          git add lib/videos.ts
          git commit -m "Sync Cardology videos from YouTube"
          git push
