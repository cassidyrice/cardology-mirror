name: Daily Cardology Blog

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:
    inputs:
      topic_slug:
        description: "Optional topic slug from content/daily-blog/topics.json"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate daily blog post
        env:
          DAILY_BLOG_TOPIC_SLUG: ${{ inputs.topic_slug }}
        run: bun run generate:daily-blog

      - name: Build site
        run: bun run build

      - name: Commit generated post
        run: |
          if git diff --quiet -- lib/generated-blog-posts.json; then
            echo "No new generated blog post."
            exit 0
          fi
          git config user.name "Cardology Pro Blog Bot"
          git config user.email "actions@github.com"
          git add lib/generated-blog-posts.json
          git commit -m "Publish daily Cardology blog post"
          git push
