<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardology Reading</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #e8e0d0;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: normal;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c9a96e;
    margin-bottom: 40px;
  }

  form {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 48px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
  }

  input[type="date"], input[type="text"] {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #e8e0d0;
    padding: 10px 14px;
    font-size: 0.95rem;
    font-family: 'Georgia', serif;
    border-radius: 4px;
    outline: none;
    width: 180px;
  }

  input:focus { border-color: #c9a96e; }

  button {
    background: #c9a96e;
    color: #0a0a0a;
    border: none;
    padding: 11px 24px;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Georgia', serif;
    font-weight: bold;
  }

  button:hover { background: #dbbf85; }
  button:disabled { background: #444; color: #888; cursor: default; }

  #cards {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card-chip {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 14px 20px;
    text-align: center;
    min-width: 120px;
  }

  .card-chip .label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 6px;
  }

  .card-chip .code {
    font-size: 1.6rem;
    color: #c9a96e;
  }

  #reading {
    max-width: 680px;
    width: 100%;
    line-height: 1.8;
    font-size: 1rem;
  }

  #reading h1, #reading h2, #reading h3 {
    color: #c9a96e;
    font-weight: normal;
    letter-spacing: 0.05em;
    margin: 1.6em 0 0.6em;
    text-transform: none;
    font-size: 1.1rem;
  }

  #reading p { margin-bottom: 1em; color: #d4ccc0; }

  #reading strong { color: #e8e0d0; }

  #reading em { color: #aaa; font-style: italic; }

  #reading hr {
    border: none;
    border-top: 1px solid #222;
    margin: 1.6em 0;
  }

  #error {
    color: #c0392b;
    font-size: 0.9rem;
    margin-bottom: 16px;
    display: none;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #c9a96e;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<h1>Cardology</h1>

<form id="form">
  <div class="field">
    <label>Birthdate</label>
    <input type="text" id="birthdate" placeholder="MM/DD/YYYY" required>
  </div>
  <div class="field">
    <label>Target date (optional)</label>
    <input type="text" id="targetdate" placeholder="MM/DD/YYYY">
  </div>
  <button type="submit" id="btn">Read</button>
</form>

<div id="error"></div>
<div id="cards"></div>
<div id="reading"></div>
